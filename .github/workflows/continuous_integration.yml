name: Continuous Integration

on: [push, pull_request]

permissions:
  contents: write
  actions: write

jobs:
  ci-init:
    if: ${{ ! startsWith(github.event.ref, 'refs/tags/x-') }}
    runs-on: ubuntu-latest
    name: CI Init
    outputs:
      url: ${{ steps.details.outputs.url }}
      tag: ${{ steps.tag.outputs.tag }}
      mode: ${{ steps.emit.outputs.mode }}
      branch: ${{ steps.branch.outputs.branch || steps.tag.outputs.branch }}
    steps:
      - id: details
        shell: bash
        env:
          EVENT: ${{ toJson(github) }}
        run: |
          echo "${EVENT}"
          echo "url=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" | tee -a "$GITHUB_OUTPUT"

      - name: Branch
        id: branch
        if: ${{ vars.PUBLISH_RELEASES && github.ref_type == 'branch' }}
        run: |
          branch="${{ github.ref_name }}"
          case "$branch" in
            trunk) mode=preview ;;
            experimental) mode=experimental ;;
          esac
          echo "mode=$mode" | tee -a "$GITHUB_OUTPUT"
          echo "branch=$branch" | tee -a "$GITHUB_OUTPUT"

      - name: Checkout
        if: ${{ github.ref_type == 'tag' }}
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Tag
        id: tag
        if: ${{ github.ref_type == 'tag' }}
        run: |
          tag="${{ github.ref_name }}"
          if [[ "$tag" =~ ^[0-9]+\.[0-9]+\.[0-9]+[^.]*$ ]]; then
            branch="${tag%.*}"
            if git merge-base --is-ancestor "$tag" "origin/$branch"; then
              mode=stable
            fi
          fi
          echo "tag=$tag" | tee -a "$GITHUB_OUTPUT"
          echo "mode=$mode" | tee -a "$GITHUB_OUTPUT"
          echo "branch=$branch" | tee -a "$GITHUB_OUTPUT"

      - name: Ready
        id: emit
        run: |
          mode=${{ steps.branch.outputs.mode || steps.tag.outputs.mode }}
          if [[ "${{ vars.PUBLISH_RELEASES }}" ]]; then
            if [[ -n "$mode" ]]; then
              echo "::notice::This build will be a '$mode' release"
            else
              echo "::notice::No release will be created for this build"
            fi
          else
            echo "::notice::This repos has PUBLISH_RELEASES disabled"
            mode=
          fi
          echo "mode=$mode" | tee -a "$GITHUB_OUTPUT"

  ci-success:
    needs:
      - debinfo
      - extra
      - lint-appstream
      - ci-init
    runs-on: ubuntu-latest
    name: CI Success
    steps:
      - name: Check Status
        run: |
          [[ "${{ contains(needs.*.result, 'failure') }}" == "false" ]] || exit 1
          [[ "${{ contains(needs.*.result, 'cancelled') }}" == "false" ]] || exit 1

# ======================
# Release Configuration
# ======================

  ci-release-preview:
    name: Preview
    needs:
      - release
      - ci-init
    if: ${{ needs.ci-init.outputs.mode == 'preview' }}
    uses: ./.github/workflows/release_core.yml
    secrets: inherit
    with:
      title: Preview
      run-id: ${{ github.run_id }}
      run-url: ${{ needs.ci-init.outputs.url }}
      commit: ${{ github.sha }}
      branch: ${{ needs.ci-init.outputs.branch }}
      tag-name: x-preview
      message: They are development builds, so they may be unstable and have issues. Please report any problems you find.
      preview: true

  ci-release-experimental:
    name: Experimental
    needs:
      - release
      - ci-init
    if: ${{ needs.ci-init.outputs.mode == 'experimental' }}
    uses: ./.github/workflows/release_core.yml
    secrets: inherit
    with:
      title: Experimental
      run-id: ${{ github.run_id }}
      run-url: ${{ needs.ci-init.outputs.url }}
      commit: ${{ github.sha }}
      branch: ${{ needs.ci-init.outputs.branch }}
      tag-name: x-testing
      message: ⚠️ They are experimental development builds, specifically to test upcoming features. **Use at your own risk**.
      label-name: experimental
      preview: true

  ci-release-stable:
    name: Stable
    needs:
      - release
      - ci-init
    if: ${{ needs.ci-init.outputs.mode == 'stable' }}
    uses: ./.github/workflows/release_core.yml
    secrets: inherit
    with:
      title: Release
      run-id: ${{ github.run_id }}
      run-url: ${{ needs.ci-init.outputs.url }}
      commit: ${{ github.sha }}
      branch: ${{ needs.ci-init.outputs.branch }}
      tag-name: ${{ needs.ci-init.outputs.tag }}
      message: Release Draft
      preview: false

# ======================
# Other Checks
# ======================

  lint-appstream:
    needs:
    - ci-init
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub/flatpak-builder-lint:latest
    name: Lint Appstream
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}
      - run: |
          file=src/posix/freedesktop/org.zdoom.UZDoom.metainfo.xml
          # These are here twice. First is to get nice output, second is to not make ci fail if network access fails
          flatpak-builder-lint --gha-format appstream $file || true
          AS_VALIDATE_NONET=1 flatpak-builder-lint appstream $file

# ======================
# Primary Build Configuration
# ======================

  debinfo:
    needs:
    - ci-init
    name: ${{ matrix.config.name }} ${{ matrix.config.build_type }}
    uses: ./.github/workflows/build_core.yml
    secrets: inherit
    with:
      build_type: RelWithDebInfo
      name: ${{ matrix.config.name }}
      os: ${{ matrix.config.os }}
      os_image: ${{ matrix.config.os_image || '' }}
      build_opts: ${{ matrix.config.build_opts }} ${{ matrix.config.build_opts_extra }}
      deps_cmdline: ${{ matrix.config.deps_cmdline }}
      extra_files: ${{ matrix.config.extra_files }}
      environment: ${{ needs.ci-init.outputs.mode }}
    strategy:
      fail-fast: false
      matrix:
        config:
        # Linux-only matrix. Windows and macOS were removed — this is a
        # Linux/fulldome-targeted fork. Release AppImage is built separately
        # by release.yml.
        # Pure compile-test on the target platform (Ubuntu 24.04, GCC + Clang).
        # AppImage packaging lives in release.yml. Older ubuntu-22.04 legs were
        # removed: the image no longer ships gcc-9 and its pipewire is too old
        # to provide the SPA headers we need.
        - name: Linux GCC
          os: ubuntu-24.04
          extra_options: -DCMAKE_C_COMPILER=gcc -DCMAKE_CXX_COMPILER=g++
          deps_cmdline: sudo apt-get update && sudo apt-get install libsdl2-dev libvpx-dev libwebp-dev libpipewire-0.3-dev
          build_type: Release

        - name: Linux Clang
          os: ubuntu-24.04
          extra_options: -DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++
          deps_cmdline: sudo apt-get update && sudo apt-get install libsdl2-dev libvpx-dev libwebp-dev libpipewire-0.3-dev
          build_type: Release

    steps:
    - uses: actions/checkout@v4

    - name: Install Dependencies
      shell: bash
      run: |
        if [[ -n "${{ matrix.config.deps_cmdline }}" ]]; then
          eval ${{ matrix.config.deps_cmdline }}
        fi
        mkdir build

    - name: Git describe
      id: ghd
      uses: proudust/gh-describe@v2
      continue-on-error: true

    # NDI SDK headers so the fulldome NDI output path (-DHAVE_NDI=1) is
    # compile-tested. Headers only; runtime is dlopen'd. Non-fatal.
    - name: Install NDI SDK headers
      continue-on-error: true
      shell: bash
      run: |
        wget -q https://downloads.ndi.tv/SDK/NDI_SDK_Linux/Install_NDI_SDK_v6_Linux.tar.gz
        tar -xf Install_NDI_SDK_v6_Linux.tar.gz
        sh ./Install_NDI_SDK_v6_Linux.sh --noexec --target "$HOME/ndisdk"
        hdr="$(find "$HOME/ndisdk" -name 'Processing.NDI.Lib.h' -print -quit)"
        if [ -n "$hdr" ]; then
          echo "NDI_SDK_DIR=$(dirname "$(dirname "$hdr")")" >> "$GITHUB_ENV"
          echo "Found NDI header: $hdr"
        else
          echo "::warning::NDI SDK header not found — NDI output disabled"
        fi

    - name: Configure
      shell: bash
      run: |
        cmake -B build -DCMAKE_BUILD_TYPE=${{ matrix.config.build_type }} -DPK3_QUIET_ZIPDIR=ON ${{ matrix.config.extra_options }} .

    - name: Build
      shell: bash
      run: |
        export GIT_DESCRIBE="${{ steps.ghd.outputs.describe }}"
        export MAKEFLAGS=--keep-going
        cmake --build build --config ${{ matrix.config.build_type }} --parallel 3

    - name: Create Package
      shell: bash
      run: |
        cd build
        mkdir package
        if [[ "${{ runner.os }}" == 'Windows' ]]; then
          cp ${{ matrix.config.build_type }}/gzdoom.exe ${{ matrix.config.build_type }}/*.pk3 ${{ matrix.config.build_type }}/zmusic.dll package
        elif [[ "${{ runner.os }}" == 'macOS' ]]; then
          if [[ "${{ matrix.config.build_type }}" != 'Release' ]]; then
            mv ${{ matrix.config.build_type }}/gzdoom.app gzdoom.app
          fi
          cp -r gzdoom.app package
        elif [[ "${{ runner.os }}" == 'Linux' ]]; then
          if [[ -n "${{ matrix.config.export_appimage }}" ]]; then
            mkdir AppDir
            cmake --install . --prefix "$(realpath AppDir)/usr"

            sudo apt-get install libfuse2 # renamed to libfuse2t64 in later releases
            wget -qO - https://github.com/AppImageCrafters/appimage-builder/releases/download/v1.1.0/appimage-builder-1.1.0-x86_64.AppImage \
              | tee appimage-builder | sha1sum
            echo "6f83a789f6c47a745b97d1b0b3f1df2e7eea7a09 appimage-builder" | sha1sum -c -
            chmod +x appimage-builder

            export GIT_DESCRIBE="${{ steps.ghd.outputs.describe }}"
            ./appimage-builder --skip-tests --recipe ../tools/AppImageBuilder.yml
            cp *.AppImage package
          else
            cp domedoom *.pk3 libzmusic.so* package
          fi
        fi

    - name: Upload Package
      uses: actions/upload-artifact@v4
      with:
        path: build/package
        name: ${{ matrix.config.name }} ${{ matrix.config.build_type }}

    - name: List Build Directory
      if: always()
      shell: bash
      run: |
        git status
        ls -lR build
