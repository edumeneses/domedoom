on:
  workflow_call:
    inputs:
      title:
        required: true
        type: string
      run-id:
        required: true
        type: string
      run-url:
        required: true
        type: string
      branch:
        required: true
        type: string
      label-name:
        required: false
        type: string
        default: ''
      tag-name:
        required: true
        type: string
      message:
        required: true
        type: string

jobs:
  upload_release:
    name: Upload Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Update Tag
        run: |
          git checkout ${{ inputs.branch }}
          git tag -d ${{ inputs.tag-name }} || true
          git push origin :refs/tags/${{ inputs.tag-name }} || true
          git tag ${{ inputs.tag-name }}
          git push origin ${{ inputs.tag-name }}

      - name: Download Artifacts
        uses: actions/download-artifact@v8
        with:
          run-id: ${{ inputs.run-id }}
          github-token: ${{ github.token }}
          path: artifacts
          pattern: "* Release"

      - name: Rename
        shell: bash
        run: |
          mkdir -p release

          function move() {
            [ "$#" == 2 ] || return;
            dir="$(dirname "$1")";
            [ -d "$dir" ] && [ -f "$1" ] && mv "$1" "$2";
          }

          move "artifacts/Windows Release"/*.zip release/Windows-UZDoom-${{ inputs.title }}.zip
          move "artifacts/MacOS Release"/*.zip release/MacOS-UZDoom-${{ inputs.title }}.zip
          move "artifacts/Linux Release"/*.AppImage release/Linux-UZDoom-${{ inputs.title }}.AppImage

      - id: notes
        name: Generate Notes
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH: ${{ inputs.branch }}
          MESSAGE: ${{ inputs.message }}
          RUN: ${{ inputs.run-url }}
          LABEL: ${{ inputs.label-name }}
        run: |
          version=$(git describe --tags --exclude x-*)
          commit=$(git log --format=%B -n 1 | head -1)
          base=""
          if [ ${BRANCH} != 'trunk' ]; then
               base=$(git merge-base trunk ${BRANCH})
          fi
          prs=""
          if [ -n "${LABEL}" ]; then
              prs=$(gh pr list --json url,title --jq '[.[] | "[\(.title)](\(.url))"] | join(" - ")' || true)
          fi

          {
              echo 'message<<EOF'
              printf 'These builds are automatically generated based on the latest commit to `%s`.\n' "${BRANCH}"
              printf '\n'
              printf '%s\n' "${MESSAGE}"
              printf '\n'
              printf '**Version:** `%s`\n' "${version}"
              if [ -n "${base}" ]; then
                  printf '**Base:** %s\n' "${base}"
              fi
              printf '**Message:** %s\n' "${commit}"
              printf '**Workflow:** [Logs](%s) - [Artifacts](%s)\n' "${RUN}" "https://nightly.link/?url=${RUN}"
              if [ -n "${prs}" ]; then
                  printf '**Pull Requests being tested**: %s\n' "$prs"
              fi
              echo 'EOF'
          } >> $GITHUB_OUTPUT

      - name: Upload
        uses: softprops/action-gh-release@v2.5.0 # FIXME: update this
        with:
          name: UZDoom ${{ inputs.title }}
          tag_name: ${{ inputs.tag-name }}
          draft: false
          prerelease: true
          make_latest: false
          generate_release_notes: false
          files: release/**
          body: ${{ steps.notes.outputs.message }}
