name: Release AppImage

# Builds a Linux x86_64 AppImage.
# On a version tag (v*) the AppImage is also attached to a GitHub Release.

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

jobs:
  build:
    name: Linux x86_64 AppImage
    runs-on: ubuntu-24.04
    permissions:
      contents: write   # needed to publish releases

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Derive version string
        id: ver
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="$(git describe --tags --always --dirty 2>/dev/null || echo dev)"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build \
            libsdl2-dev \
            libopenal-dev \
            zlib1g-dev \
            libbz2-dev \
            libjpeg-dev \
            libgl-dev \
            libvulkan-dev \
            libpipewire-0.3-dev \
            libwebp-dev \
            libvpx-dev \
            nasm \
            wget \
            file \
            librsvg2-bin

      # NDI SDK headers (build-time only). The runtime libndi.so.6 is loaded
      # via dlopen at first use, so the AppImage carries no link-time NDI
      # dependency — end users still need the NDI 6 runtime installed. We only
      # need the headers here so the build defines -DHAVE_NDI=1. The installer
      # is a makeself archive: --noexec --target extracts it without the
      # interactive EULA prompt. Non-fatal: if the mirror is down the build
      # still succeeds with NDI output disabled.
      - name: Install NDI SDK headers
        continue-on-error: true
        run: |
          # The NDI installer is a hand-rolled self-extractor (NOT makeself): it
          # gates on an interactive EULA prompt ("Type y or Y to agree") and then
          # ALWAYS extracts to "./NDI SDK for Linux" relative to the CWD. The
          # --noexec/--target flags it appears to accept are silently ignored.
          # So: run it from $HOME with 'y' piped in; the SDK lands in
          # "$HOME/NDI SDK for Linux", which cmake's find_path HINT already covers.
          cd "$HOME"
          wget -q https://downloads.ndi.tv/SDK/NDI_SDK_Linux/Install_NDI_SDK_v6_Linux.tar.gz
          tar -xf Install_NDI_SDK_v6_Linux.tar.gz
          echo y | sh ./Install_NDI_SDK_v6_Linux.sh || true
          hdr="$(find "$HOME" -name 'Processing.NDI.Lib.h' -print -quit 2>/dev/null || true)"
          if [ -n "$hdr" ]; then
            echo "NDI_SDK_DIR=$(dirname "$(dirname "$hdr")")" >> "$GITHUB_ENV"
            echo "Found NDI header: $hdr"
          else
            echo "::warning::NDI SDK header not found — NDI output will be disabled"
          fi

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DZDOOM_EXE_NAME=cubedoom \
            -DPK3_QUIET_ZIPDIR=ON \
            -DCMAKE_INSTALL_PREFIX=/usr

      - name: Build
        run: cmake --build build --parallel

      - name: Install into AppDir
        run: |
          DESTDIR="$(pwd)/AppDir" cmake --install build
          # The bundled (non-system) zmusic is built as a shared lib and copied
          # next to the binary by a POST_BUILD step, but not installed. Stage it
          # into usr/lib so linuxdeploy can resolve libzmusic.so.1.
          mkdir -p AppDir/usr/lib
          find build -maxdepth 3 -name 'libzmusic.so*' -exec cp -av {} AppDir/usr/lib/ \; || true
          ls -l AppDir/usr/lib/ || true

      - name: Prepare AppDir metadata
        run: |
          APPDIR="$(pwd)/AppDir"
          mkdir -p "${APPDIR}/usr/share/applications"
          mkdir -p "${APPDIR}/usr/share/icons/hicolor/256x256/apps"

          printf '%s\n' \
            '[Desktop Entry]' \
            'Name=CubeDoom' \
            'Comment=Doom engine - Fulldome Edition' \
            'Exec=cubedoom' \
            'Icon=cubedoom' \
            'Type=Application' \
            'Categories=Game;' \
            > "${APPDIR}/usr/share/applications/cubedoom.desktop"

          # Custom AppRun.
          # - DOOMWADDIR: engine searches /usr/share/games/doom by absolute path;
          #   redirect to in-AppDir copy so pk3 files are found.
          # - LD_LIBRARY_PATH: linuxdeploy sets RUNPATH (not RPATH) on the binary,
          #   but dlopen() for runtime-loaded libs (NDI, OSC) searches LD_LIBRARY_PATH
          #   BEFORE RUNPATH.  Without it, plain dlopen("libndi.so.6") only searches
          #   ldconfig — which may not include /usr/local/lib (NDI Tools install dir).
          #   Prepend AppDir libs (bundled deps) then /usr/local/lib so NDI is found.
          printf '%s\n' \
            '#!/bin/sh' \
            'HERE="$(dirname "$(readlink -f "$0")")"' \
            'export DOOMWADDIR="${DOOMWADDIR:-$HERE/usr/share/games/doom}"' \
            'export LD_LIBRARY_PATH="${HERE}/usr/lib:${HERE}/usr/lib/x86_64-linux-gnu:/usr/local/lib${LD_LIBRARY_PATH:+:${LD_LIBRARY_PATH}}"' \
            'exec "$HERE/usr/bin/cubedoom" "$@"' \
            > "$(pwd)/AppRun.sh"
          chmod +x "$(pwd)/AppRun.sh"

          ICON_SRC="${APPDIR}/usr/share/icons/hicolor/scalable/apps/org.zdoom.GZDoom.svg"
          ICON_DST="${APPDIR}/usr/share/icons/hicolor/256x256/apps/cubedoom.png"
          if [ -f "${ICON_SRC}" ]; then
            rsvg-convert -w 256 -h 256 "${ICON_SRC}" -o "${ICON_DST}"
          else
            python3 -c "
          import struct, zlib
          def chunk(tag, data):
              crc = struct.pack('>I', zlib.crc32(tag + data) & 0xffffffff)
              return struct.pack('>I', len(data)) + tag + data + crc
          w, h = 256, 256
          ihdr = struct.pack('>IIBBBBB', w, h, 8, 2, 0, 0, 0)
          raw = b''.join(b'\x00' + b'\x18\x18\x18' * w for _ in range(h))
          png = (b'\x89PNG\r\n\x1a\n'
                 + chunk(b'IHDR', ihdr)
                 + chunk(b'IDAT', zlib.compress(raw))
                 + chunk(b'IEND', b''))
          open('${ICON_DST}', 'wb').write(png)
          "
          fi

      - name: Download and extract linuxdeploy
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage
          ./linuxdeploy-x86_64.AppImage --appimage-extract
          echo "$(pwd)/squashfs-root/usr/bin" >> "$GITHUB_PATH"

      - name: Create AppImage
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          # linuxdeploy resolves NEEDED libs via ldd-style search, not AppDir
          # subdirs, so expose the staged zmusic dirs on the loader path.
          export LD_LIBRARY_PATH="$(pwd)/AppDir/usr/lib:$(pwd)/AppDir/usr/lib/x86_64-linux-gnu:${LD_LIBRARY_PATH}"
          linuxdeploy \
            --appdir AppDir \
            --executable AppDir/usr/bin/cubedoom \
            --desktop-file AppDir/usr/share/applications/cubedoom.desktop \
            --icon-file AppDir/usr/share/icons/hicolor/256x256/apps/cubedoom.png \
            --custom-apprun "$(pwd)/AppRun.sh" \
            --exclude-library "libpipewire*" \
            --exclude-library "libspa-*" \
            --output appimage
          mv CubeDoom*.AppImage "cubedoom-${VERSION}-x86_64.AppImage" 2>/dev/null \
            || mv *.AppImage "cubedoom-${VERSION}-x86_64.AppImage"

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: CubeDoom-${{ steps.ver.outputs.version }}-x86_64
          path: cubedoom-*.AppImage
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: cubedoom-*.AppImage
          name: CubeDoom ${{ steps.ver.outputs.version }}
          body: |
            ## CubeDoom ${{ steps.ver.outputs.version }} - Fulldome Edition

            ### Requirements
            - Linux x86_64
            - PipeWire (Ubuntu 24.04 ships it by default)
            - A Doom IWAD (DOOM.WAD, DOOM2.WAD, etc.)

            ### Usage
            ```
            chmod +x cubedoom-*.AppImage
            ./cubedoom-*.AppImage -iwad /path/to/doom.wad
            ```

            ### Fulldome output
            Enable cubemap rendering: Options -> Fulldome Output

            NDI output additionally needs the NDI 6 runtime on the host
            (`libndi.so.6`): https://ndi.video/download-ndi-sdk/ or the
            NDI Tools/Redist package.

      # ── Rolling release ───────────────────────────────────────────────────
      # Every push to master refreshes a single "continuous" prerelease that
      # always carries the newest AppImage under a stable filename.
      - name: Stage rolling asset
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: cp "cubedoom-${{ steps.ver.outputs.version }}-x86_64.AppImage" cubedoom-continuous-x86_64.AppImage

      - name: Publish rolling release
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: continuous
          prerelease: true
          make_latest: false
          name: CubeDoom (rolling build)
          files: cubedoom-continuous-x86_64.AppImage
          body: |
            ## CubeDoom - rolling build

            Automatic build from the latest commit on `master`
            (${{ github.sha }}). This prerelease is overwritten on every push;
            for stable versions see the tagged releases.

            ### Requirements
            - Linux x86_64
            - PipeWire (Ubuntu 24.04 ships it by default)
            - A Doom IWAD (DOOM.WAD, DOOM2.WAD, etc.)

            ### Usage
            ```
            chmod +x cubedoom-continuous-x86_64.AppImage
            ./cubedoom-continuous-x86_64.AppImage -iwad /path/to/doom.wad
            ```

            ### Fulldome output
            Enable cubemap rendering: Options -> Fulldome Output

            NDI output additionally needs the NDI 6 runtime on the host
            (`libndi.so.6`): https://ndi.video/download-ndi-sdk/ or the
            NDI Tools/Redist package.
